<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>NG's Daily Task Picker</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #2c2c2c;
            color: #ff69b4; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        /* The Main Wheel Container */
        #wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            border: 5px solid #ff69b4;
            border-radius: 50%;
            overflow: hidden;
            /* Smooth decelerating spin */
            transition: transform 3s cubic-bezier(0.1, 0, 0.2, 1);
            background-color: #444;
        }

        /* The Slices */
        .wheel-part {
            position: absolute;
            width: 100%;
            height: 100%;
            /* This creates the 90-degree pie slice shape */
            clip-path: polygon(50% 50%, 50% 0, 100% 0, 100% 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            transform-origin: 50% 50%;
            font-weight: bold;
            color: white;
            font-size: 0.9rem;
        }

        /* The Gold Pointer at the top */
        #pointer {
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid gold;
            margin-bottom: 10px;
            z-index: 10;
        }

        button {
            margin-top: 30px;
            padding: 15px 30px;
            background-color: #ff69b4;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 4px 0 #d14d8d;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #d14d8d;
        }

        #result { 
            margin-top: 20px; 
            font-size: 1.4rem; 
            min-height: 1.6rem; 
            color: gold; 
        }

        .back-link {
            margin-top: 40px;
            color: #888;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <h1>Task Roleta</h1>
    
    <div id="pointer"></div>

    <div id="wheel-container">
        <div class="wheel-part" style="transform: rotate(0deg); background: #555;">Walk</div>
        <div class="wheel-part" style="transform: rotate(90deg); background: #666;">Lifts</div>
        <div class="wheel-part" style="transform: rotate(180deg); background: #777;">Pixels</div>
        <div class="wheel-part" style="transform: rotate(270deg); background: #888;">Rest</div>
    </div>

    <button onclick="spin()">SPIN FOR TASK</button>
    
    <div id="result"></div>

    <a href="../index.html" class="back-link">← Back to Studio</a>

    <script>
        function spin() {
            const wheel = document.getElementById('wheel-container');
            const resultDisplay = document.getElementById('result');
            
            // Generate a random spin: 2-5 full rotations + random angle
            const randomDegree = Math.floor(Math.random() * 360) + 720; 
            
            // Apply the rotation
            wheel.style.transform = `rotate(${randomDegree}deg)`;
            resultDisplay.innerText = "Selecting...";
            
            // Wait for the 3s CSS transition to finish
            setTimeout(() => {
                const actualDegree = randomDegree % 360;
                let task = "";

                /* Logic mapping (based on the CSS rotation of slices):
                   0-90 = Rest (because the wheel spins clockwise)
                   90-180 = Pixels
                   180-270 = Lifts
                   270-360 = Walk
                */
                if (actualDegree >= 0 && actualDegree < 90) task = "Rest";
                else if (actualDegree >= 90 && actualDegree < 180) task = "Pixels";
                else if (actualDegree >= 180 && actualDegree < 270) task = "Lifts";
                else task = "Walk";
                
                resultDisplay.innerText = "Today's Focus: " + task;
            }, 3000);
        }
    </script>
</body>
</html>
