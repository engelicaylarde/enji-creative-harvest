<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Enji's Creative Warm-up</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #2c2c2c;
            color: #ff69b4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 0;
            margin: 0;
        }
        .roleta-section {
            margin-bottom: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            border: 5px solid #ff69b4;
            border-radius: 50%;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1);
            background: #444;
        }
        .pointer {
            width: 0; height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid gold;
            z-index: 10;
            margin-bottom: 10px;
        }
        button {
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #ff69b4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .result { margin-top: 15px; font-size: 1.2rem; color: gold; font-weight: bold; min-height: 1.5em; }
        
        /* Color Wheel Specific Styling */
        #color-wheel {
            background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);
        }
    </style>
</head>
<body>

    <div class="roleta-section">
        <h2>1. Task Roleta</h2>
        <div class="pointer"></div>
        <div id="task-wheel" class="wheel-container">
            <div style="position:absolute; width:100%; height:100%; background: repeating-conic-gradient(#555 0 90deg, #666 90deg 180deg);"></div>
        </div>
        <button onclick="spin('task')">SPIN TASKS</button>
        <div id="task-result" class="result"></div>
    </div>

    <div class="roleta-section">
        <h2>2. Shape Roleta</h2>
        <div class="pointer"></div>
        <div id="shape-wheel" class="wheel-container">
            <div style="position:absolute; width:100%; height:100%; background: repeating-conic-gradient(#444 0 20deg, #333 20deg 40deg);"></div>
        </div>
        <button onclick="spin('shape')">SPIN SHAPES</button>
        <div id="shape-result" class="result"></div>
    </div>

    <div class="roleta-section">
        <h2>3. Color Roleta</h2>
        <div class="pointer"></div>
        <div id="color-wheel" class="wheel-container"></div>
        <button onclick="spin('color')">SPIN COLORS</button>
        <div id="color-result" class="result"></div>
    </div>

    <p><a href="../index.html" style="color: gray; text-decoration: none;">← Back to Studio</a></p>
